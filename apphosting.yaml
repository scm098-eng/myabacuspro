
kind: "AppStack"
schemaVersion: "v1"

runConfig:
  maxInstances: 1
  memoryMiB: 1024

env:
  # Razorpay Public Key (for the browser/frontend)
  - variable: NEXT_PUBLIC_RAZORPAY_KEY_ID
    secret: RAZORPAY_KEY_ID
    availability:
      - BUILD
      - RUNTIME

  # Razorpay Secret Key (server-side only)
  - variable: RAZORPAY_KEY_SECRET
    secret: RAZORPAY_KEY_SECRET
    availability:
      - RUNTIME

  # Using GMAIL_APP_PASSWORD (no pin to avoid broken versions)
  - variable: GMAIL_APP_PASSWORD
    secret: GMAIL_APP_PASSWORD
    availability:
      - RUNTIME

  # Firebase Frontend Variables
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    secret: FIREBASE_AUTH_DOMAIN
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    secret: FIREBASE_PROJECT_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME
