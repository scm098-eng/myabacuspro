kind: "AppStack"
schemaVersion: "v1"

runConfig:
  maxInstances: 1

env:
  - variable: NEXT_PUBLIC_RAZORPAY_KEY_ID
    secret: RAZORPAY_KEY_ID
    availability:
      - BUILD
      - RUNTIME
  - variable: RAZORPAY_KEY_SECRET
    secret: RAZORPAY_KEY_SECRET
    availability:
      - RUNTIME
  - variable: GMAIL_APP_PASSWORD
    secret: GMAIL_APP_PASSWORD
    availability:
      - RUNTIME
